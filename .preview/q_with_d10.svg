<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1300" style="background:#fff">
  <style>
    .gutter { stroke: #000; stroke-width: 3; fill: none; }
    .ph { stroke: #ca8a04; stroke-width: 1; stroke-dasharray: 6,4; fill: none; }
    .hip-nw { stroke: #c62828; stroke-width: 2; fill: none; }
    .hip-sw { stroke: #c62828; stroke-width: 2; fill: none; }
    .valley { stroke: #1565c0; stroke-width: 2; stroke-dasharray: 10,5; fill: none; }
    .ridge { stroke: #8e24aa; stroke-width: 2; fill: none; }
    .ridge-ext { stroke: #8e24aa; stroke-width: 1.5; stroke-dasharray: 6,4; fill: none; }
    .yellow-box { stroke: #ca8a04; stroke-width: 2; fill: none; stroke-dasharray: 4,3; }
    .lbl { font-family: -apple-system, sans-serif; font-size: 14px; fill: #111; font-weight: 600; }
    .dim { font-family: -apple-system, sans-serif; font-size: 12px; fill: #444; }
    .empty { fill: #f5f5f5; stroke: #999; stroke-width: 1.5; stroke-dasharray: 5,4; }
  </style>

  <path d="M 100,100 L 400,100 L 400,400 L 1000,400 L 1000,1100 L 100,1100 Z" class="gutter" />

  <!-- Phantom main 4-hip lines -->
  <line x1="1000" y1="400" x2="650" y2="750" class="ph" />
  <line x1="1000" y1="1100" x2="650" y2="750" class="ph" />
  <line x1="450" y1="750" x2="650" y2="750" class="ridge" />

  <!-- Donor origin tints in yellow box (extended for D10) -->
  <rect x="100" y="400" width="38" height="350" fill="#ef4444" fill-opacity="0.06" stroke="#ef4444" stroke-width="0.4" stroke-dasharray="2,2" /><rect x="138" y="400" width="38" height="350" fill="#f59e0b" fill-opacity="0.06" stroke="#f59e0b" stroke-width="0.4" stroke-dasharray="2,2" /><rect x="176" y="400" width="38" height="350" fill="#eab308" fill-opacity="0.06" stroke="#eab308" stroke-width="0.4" stroke-dasharray="2,2" /><rect x="214" y="400" width="38" height="350" fill="#84cc16" fill-opacity="0.06" stroke="#84cc16" stroke-width="0.4" stroke-dasharray="2,2" /><rect x="252" y="400" width="38" height="350" fill="#10b981" fill-opacity="0.06" stroke="#10b981" stroke-width="0.4" stroke-dasharray="2,2" /><rect x="290" y="400" width="38" height="350" fill="#06b6d4" fill-opacity="0.06" stroke="#06b6d4" stroke-width="0.4" stroke-dasharray="2,2" /><rect x="328" y="400" width="38" height="350" fill="#3b82f6" fill-opacity="0.06" stroke="#3b82f6" stroke-width="0.4" stroke-dasharray="2,2" /><rect x="366" y="400" width="38" height="350" fill="#8b5cf6" fill-opacity="0.06" stroke="#8b5cf6" stroke-width="0.4" stroke-dasharray="2,2" /><rect x="404" y="400" width="38" height="350" fill="#ec4899" fill-opacity="0.06" stroke="#ec4899" stroke-width="0.4" stroke-dasharray="2,2" /><rect x="442" y="400" width="38" height="350" fill="#a3a3a3" fill-opacity="0.06" stroke="#a3a3a3" stroke-width="0.4" stroke-dasharray="2,2" />
  <rect x="100" y="400" width="380" height="350" class="yellow-box" />

