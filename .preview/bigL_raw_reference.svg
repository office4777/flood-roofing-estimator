<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1300" style="background:#fafafa">
  <style>
    .gutter { stroke: #000; stroke-width: 3; fill: none; }
    .lbl { font-family: -apple-system, sans-serif; font-size: 14px; fill: #111; }
    .dim { font-family: -apple-system, sans-serif; font-size: 13px; fill: #555; font-style: italic; }
    .pt  { fill: #c62828; }
  </style>

  <!-- L-shape outline (the user's Big-L footprint) -->
  <path d="M 100,100 L 400,100 L 400,400 L 1000,400 L 1000,1100 L 100,1100 Z" class="gutter" />

  <!-- Corners labeled -->
  <circle cx="100"  cy="100"  r="5" class="pt" />
  <circle cx="400"  cy="100"  r="5" class="pt" />
  <circle cx="400"  cy="400"  r="5" class="pt" />
  <circle cx="1000" cy="400"  r="5" class="pt" />
  <circle cx="1000" cy="1100" r="5" class="pt" />
  <circle cx="100"  cy="1100" r="5" class="pt" />

  <text x="60"   y="92"   class="lbl">NW (100, 100)</text>
  <text x="360"  y="92"   class="lbl">(400, 100)</text>
  <text x="410"  y="395"  class="lbl">reflex (400, 400)</text>
  <text x="1010" y="395"  class="lbl">NE (1000, 400)</text>
  <text x="1010" y="1115" class="lbl">SE (1000, 1100)</text>
  <text x="40"   y="1120" class="lbl">SW (100, 1100)</text>

  <!-- Wing / main labels -->
  <text x="170"  y="260" class="dim">Wing</text>
  <text x="150"  y="280" class="dim">300 × 300</text>
  <text x="600"  y="760" class="dim">Main body</text>
  <text x="600"  y="780" class="dim">900 × 700</text>

  <!-- Edge length annotations -->
  <text x="220"  y="135" class="dim">300</text>
  <text x="700"  y="435" class="dim">600</text>
  <text x="1015" y="750" class="dim">700</text>
  <text x="540"  y="1135" class="dim">900</text>
  <text x="60"   y="600" class="dim" transform="rotate(-90 60 600)">1000</text>
  <text x="415"  y="250" class="dim" transform="rotate(-90 415 250)">300</text>

  <text x="100" y="1230" class="lbl" style="font-size:13px;fill:#666">Raw L-shape outline · gutters black · 6 corners (5 convex + 1 reflex) · units: px @ 0.02 m/px</text>
</svg>