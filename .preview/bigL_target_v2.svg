<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1300" style="background:#fafafa">
  <style>
    .hip { stroke: #c62828; stroke-width: 2.5; fill: none; }
    .ridge { stroke: #8e24aa; stroke-width: 2.5; fill: none; }
    .valley { stroke: #1565c0; stroke-width: 3; stroke-dasharray: 12,6; fill: none; }
    .face-main-n { fill: #f97316aa; stroke: #f97316; stroke-width: 1; }
    .face-main-s { fill: #2563ebaa; stroke: #2563eb; stroke-width: 1; }
    .face-main-w { fill: #16a34aaa; stroke: #16a34a; stroke-width: 1; }
    .face-main-e { fill: #16a34aaa; stroke: #16a34a; stroke-width: 1; }
    .wing      { fill: #a855f7aa; stroke: #a855f7; stroke-width: 1; }
    .label { font-family: -apple-system, sans-serif; font-size: 18px; font-weight: 600; fill: #111; }
    .label-sm { font-family: -apple-system, sans-serif; font-size: 14px; fill: #333; }
  </style>

  <!-- Faces -->
  <path d="M 400,400 L 1000,400 L 650,750 L 450,750 L 250,550 Z" class="face-main-n" />
  <path d="M 100,1100 L 1000,1100 L 650,750 L 450,750 Z" class="face-main-s" />
  <path d="M 100,400 L 250,550 L 450,750 L 100,1100 Z" class="face-main-w" />
  <path d="M 1000,400 L 1000,1100 L 650,750 Z" class="face-main-e" />
  <path d="M 100,100 L 400,100 L 400,400 L 250,550 L 100,400 Z" class="wing" />

  <!-- L-shape outline -->
  <path d="M 100,100 L 400,100 L 400,400 L 1000,400 L 1000,1100 L 100,1100 Z" fill="none" stroke="#000" stroke-width="3" />

  <!-- Hip lines + ridge + valley -->
  <path d="M 100,400 L 450,750" class="hip" />
  <path d="M 1000,400 L 650,750" class="hip" />
  <path d="M 100,1100 L 450,750" class="hip" />
  <path d="M 1000,1100 L 650,750" class="hip" />
  <path d="M 450,750 L 650,750" class="ridge" />
  <path d="M 400,400 L 250,550" class="valley" />

  <!-- Labels -->
  <text x="200" y="270" class="label">Wing region</text>
  <text x="160" y="295" class="label-sm">(incl. NW chunk of N long-side)</text>

  <text x="540" y="540" class="label">Main N long-side (pentagon)</text>
  <text x="500" y="970" class="label">Main S long-side</text>
  <text x="150" y="800" class="label">W hip-end</text>
  <text x="850" y="780" class="label">E hip-end</text>

  <text x="310" y="455" class="label-sm" fill="#1565c0">VALLEY 45° SW</text>
  <text x="270" y="475" class="label-sm" fill="#1565c0">(400,400) → (250,550)</text>

  <!-- Key points -->
  <circle cx="400" cy="400" r="6" fill="#1565c0" />
  <text x="412" y="395" class="label-sm" fill="#1565c0">inner reflex (400,400)</text>
  <circle cx="250" cy="550" r="6" fill="#1565c0" />
  <text x="262" y="555" class="label-sm" fill="#1565c0">valley term (250,550)</text>
  <circle cx="450" cy="750" r="5" fill="#8e24aa" />
  <text x="455" y="775" class="label-sm" fill="#8e24aa">ridge W endpoint (450,750)</text>
  <circle cx="650" cy="750" r="5" fill="#8e24aa" />
  <text x="660" y="775" class="label-sm" fill="#8e24aa">ridge E endpoint (650,750)</text>

  <!-- Chunk callout: the small triangle absorbed by wing -->
  <text x="155" y="475" class="label-sm" fill="#5e1f9a">"chunk"</text>
</svg>