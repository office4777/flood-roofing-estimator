<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1300" style="background:#fff">
  <style>
    .gutter { stroke: #000; stroke-width: 3; fill: none; }
    .ph { stroke: #ca8a04; stroke-width: 2; stroke-dasharray: 8,5; fill: none; }
    .lbl { font-family: -apple-system, sans-serif; font-size: 16px; fill: #111; }
    .dim { font-family: -apple-system, sans-serif; font-size: 13px; fill: #555; font-style: italic; }
    .grid { stroke: #ddd; stroke-width: 0.5; }
    .gridmajor { stroke: #aaa; stroke-width: 0.7; }
    .pt { fill: #c62828; }
  </style>

  <!-- grid every 50px, major every 100px -->
  <line x1="100" y1="100" x2="100" y2="1100" class="gridmajor"/><line x1="150" y1="100" x2="150" y2="1100" class="grid"/><line x1="200" y1="100" x2="200" y2="1100" class="gridmajor"/><line x1="250" y1="100" x2="250" y2="1100" class="grid"/><line x1="300" y1="100" x2="300" y2="1100" class="gridmajor"/><line x1="350" y1="100" x2="350" y2="1100" class="grid"/><line x1="400" y1="100" x2="400" y2="1100" class="gridmajor"/><line x1="450" y1="100" x2="450" y2="1100" class="grid"/><line x1="500" y1="100" x2="500" y2="1100" class="gridmajor"/><line x1="550" y1="100" x2="550" y2="1100" class="grid"/><line x1="600" y1="100" x2="600" y2="1100" class="gridmajor"/><line x1="650" y1="100" x2="650" y2="1100" class="grid"/><line x1="700" y1="100" x2="700" y2="1100" class="gridmajor"/><line x1="750" y1="100" x2="750" y2="1100" class="grid"/><line x1="800" y1="100" x2="800" y2="1100" class="gridmajor"/><line x1="850" y1="100" x2="850" y2="1100" class="grid"/><line x1="900" y1="100" x2="900" y2="1100" class="gridmajor"/><line x1="950" y1="100" x2="950" y2="1100" class="grid"/><line x1="1000" y1="100" x2="1000" y2="1100" class="gridmajor"/><line x1="100" y1="100" x2="1000" y2="100" class="gridmajor"/><line x1="100" y1="150" x2="1000" y2="150" class="grid"/><line x1="100" y1="200" x2="1000" y2="200" class="gridmajor"/><line x1="100" y1="250" x2="1000" y2="250" class="grid"/><line x1="100" y1="300" x2="1000" y2="300" class="gridmajor"/><line x1="100" y1="350" x2="1000" y2="350" class="grid"/><line x1="100" y1="400" x2="1000" y2="400" class="gridmajor"/><line x1="100" y1="450" x2="1000" y2="450" class="grid"/><line x1="100" y1="500" x2="1000" y2="500" class="gridmajor"/><line x1="100" y1="550" x2="1000" y2="550" class="grid"/><line x1="100" y1="600" x2="1000" y2="600" class="gridmajor"/><line x1="100" y1="650" x2="1000" y2="650" class="grid"/><line x1="100" y1="700" x2="1000" y2="700" class="gridmajor"/><line x1="100" y1="750" x2="1000" y2="750" class="grid"/><line x1="100" y1="800" x2="1000" y2="800" class="gridmajor"/><line x1="100" y1="850" x2="1000" y2="850" class="grid"/><line x1="100" y1="900" x2="1000" y2="900" class="gridmajor"/><line x1="100" y1="950" x2="1000" y2="950" class="grid"/><line x1="100" y1="1000" x2="1000" y2="1000" class="gridmajor"/><line x1="100" y1="1050" x2="1000" y2="1050" class="grid"/><line x1="100" y1="1100" x2="1000" y2="1100" class="gridmajor"/>

  <!-- L-shape outline -->
  <path d="M 100,100 L 400,100 L 400,400 L 1000,400 L 1000,1100 L 100,1100 Z" class="gutter" />

  <!-- Phantom main 4-hip (faded) -->
  <line x1="100" y1="400"  x2="450" y2="750"  class="ph" />
  <line x1="1000" y1="400" x2="650" y2="750"  class="ph" />
  <line x1="100" y1="1100" x2="450" y2="750"  class="ph" />
  <line x1="1000" y1="1100" x2="650" y2="750" class="ph" />
  <line x1="450" y1="750"  x2="650" y2="750"  class="ph" />

  <!-- Coordinate labels on key points -->
  <circle cx="100" cy="100" r="4" class="pt" /><text x="60" y="90" class="lbl">(100,100)</text>
  <circle cx="400" cy="100" r="4" class="pt" /><text x="380" y="90" class="lbl">(400,100)</text>
  <circle cx="400" cy="400" r="4" class="pt" /><text x="410" y="395" class="lbl">(400,400) reflex</text>
  <circle cx="1000" cy="400" r="4" class="pt" /><text x="1010" y="395" class="lbl">(1000,400)</text>
  <circle cx="100" cy="1100" r="4" class="pt" /><text x="40" y="1120" class="lbl">(100,1100)</text>
  <circle cx="1000" cy="1100" r="4" class="pt" /><text x="1010" y="1120" class="lbl">(1000,1100)</text>

  <!-- Mark phantom apex points -->
  <circle cx="450" cy="750" r="4" fill="#ca8a04" /><text x="455" y="745" class="dim">(450,750) main W apex</text>
  <circle cx="650" cy="750" r="4" fill="#ca8a04" /><text x="655" y="745" class="dim">(650,750) main E apex</text>

  <!-- Grid hint -->
  <text x="100" y="1200" class="dim">grid = 50px · major grid = 100px · solid black = roof outline · dashed gold = phantom main 4-hip lines (if no wing)</text>

  <text x="100" y="1240" class="lbl">↓ Please draw on this and label:</text>
  <text x="100" y="1265" class="lbl">  1) the YELLOW rectangle's four corners (with coordinates)</text>
  <text x="100" y="1290" class="lbl">  2) which way the donor sheets run inside it (arrow showing sheet length direction)</text>
</svg>