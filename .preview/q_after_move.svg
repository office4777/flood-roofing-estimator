  <text x="180" y="600" font-family="-apple-system" font-size="22" fill="#777" font-weight="700">?</text>
  <text x="160" y="640" font-family="-apple-system" font-size="11" fill="#777">(upper-half empty</text>
  <text x="160" y="655" font-family="-apple-system" font-size="11" fill="#777">— needs another source)</text>

