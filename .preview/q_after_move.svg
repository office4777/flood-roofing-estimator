n points="404,100 442,100 442,442 404,404" fill="#ec4899" fill-opacity="0.6" stroke="#ec4899" stroke-width="0.8" /><text x="423" y="265.5" text-anchor="middle" font-family="-apple-system" font-size="10" font-weight="700" fill="#222">D9</text><polygon points="442,100 450,100 450,450 442,442" fill="#ef4444" fill-opacity="0.6" stroke="#ef4444" stroke-width="0.8" /><text x="446" y="277" text-anchor="middle" font-family="-apple-system" font-size="10" font-weight="700" fill="#222">D10</text>
  <polygon points="252,548 290,510 290,590 252,552" fill="#10b981" fill-opacity="0.6" stroke="#10b981" stroke-width="0.8" /><text x="271" y="554" text-anchor="middle" font-family="-apple-system" font-size="9" font-weight="700" fill="#222">D5</text><polygon points="290,510 328,472 328,628 290,590" fill="#06b6d4" fill-opacity="0.6" stroke="#06b6d4" stroke-width="0.8" /><text x="309" y="554" text-anchor="middle" font-family="-apple-system" font-size="9" font-weight="700" fill="#222">D6</text><polygon points="328,472 366,434 366,666 328,628" fill="#3b82f6" fill-opacity="0.6" stroke="#3b82f6" stroke-width="0.8" /><text x="347" y="554" text-anchor="middle" font-family="-apple-system" font-size="9" font-weight="700" fill="#222">D7</text><polygon points="366,434 404,396 404,704 366,666" fill="#8b5cf6" fill-opacity="0.6" stroke="#8b5cf6" stroke-width="0.8" /><text x="385" y="554" text-anchor="middle" font-family="-apple-system" font-size="9" font-weight="700" fill="#222">D8</text>
  <polygon points="450,750 412,788 100,788 100,750" fill="#ef4444" fill-opacity="0.6" stroke="#ef4444" stroke-width="0.8" /><text x="265.5" y="773" text-anchor="middle" font-family="-apple-system" font-size="10" font-weight="700" fill="#222">D1</text><polygon points="412,788 374,826 100,826 100,788" fill="#f59e0b" fill-opacity="0.6" stroke="#f59e0b" stroke-width="0.8" /><text x="246.5" y="811" text-anchor="middle" font-family="-apple-system" font-size="10" font-weight="700" fill="#222">D2</text><polygon points="374,826 336,864 100,864 100,826" fill="#eab308" fill-opacity="0.6" stroke="#eab308" stroke-width="0.8" /><text x="227.5" y="849" text-anchor="middle" font-family="-apple-system" font-size="10" font-weight="700" fill="#222">D3</text><polygon points="336,864 298,902 100,902 100,864" fill="#84cc16" fill-opacity="0.6" stroke="#84cc16" stroke-width="0.8" /><text x="208.5" y="887" text-anchor="middle" font-family="-apple-system" font-size="10" font-weight="700" fill="#222">D4</text><polygon points="298,902 260,940 100,940 100,902" fill="#10b981" fill-opacity="0.6" stroke="#10b981" stroke-width="0.8" /><text x="189.5" y="925" text-anchor="middle" font-family="-apple-system" font-size="10" font-weight="700" fill="#222">D5</text><polygon points="260,940 222,978 100,978 100,940" fill="#06b6d4" fill-opacity="0.6" stroke="#06b6d4" stroke-width="0.8" /><text x="170.5" y="963" text-anchor="middle" font-family="-apple-system" font-size="10" font-weight="700" fill="#222">D6</text><polygon points="222,978 184,1016 100,1016 100,978" fill="#3b82f6" fill-opacity="0.6" stroke="#3b82f6" stroke-width="0.8" /><text x="151.5" y="1001" text-anchor="middle" font-family="-apple-system" font-size="10" font-weight="700" fill="#222">D7</text><polygon points="184,1016 146,1054 100,1054 100,1016" fill="#8b5cf6" fill-opacity="0.6" stroke="#8b5cf6" stroke-width="0.8" /><text x="132.5" y="1039" text-anchor="middle" font-family="-apple-system" font-size="10" font-weight="700" fill="#222">D8</text><polygon points="146,1054 108,1092 100,1092 100,1054" fill="#ec4899" fill-opacity="0.6" stroke="#ec4899" stroke-width="0.8" /><text x="113.5" y="1077" text-anchor="middle" font-family="-apple-system" font-size="10" font-weight="700" fill="#222">D9</text><polygon points="108,1092 100,1100 100,1100 100,1092" fill="#ef4444" fill-opacity="0.6" stroke="#ef4444" stroke-width="0.8" /><text x="102" y="1100" text-anchor="middle" font-family="-apple-system" font-size="10" font-weight="700" fill="#222">D10</text>

  <!-- Hip and valley lines on top -->
  <line x1="100" y1="400" x2="450" y2="750" class="hip-nw" />
  <line x1="100" y1="1100" x2="450" y2="750" class="hip-sw" />
  <line x1="400" y1="400" x2="250" y2="550" class="valley" />
  <line x1="100" y1="100" x2="250" y2="250" class="hip-nw" />
  <line x1="400" y1="100" x2="250" y2="250" class="hip-nw" />

  <!-- Labels for destinations -->
  <text x="250" y="225" text-anchor="middle" class="lbl">Wing N hip-end</text>
  <text x="250" y="242" text-anchor="middle" class="dim">(translated north pieces)</text>

  <text x="330" y="475" class="lbl" fill="#444">chunk</text>
  <text x="290" y="492" class="dim">(middle pieces)</text>

  <text x="230" y="940" class="lbl">SW corner hip</text>
  <text x="220" y="958" class="dim">(rotated south pieces)</text>

  <text x="540" y="450" class="lbl">Where each donor piece ended up:</text>
  <text x="540" y="475" class="dim">• North piece → translated 300px north → wing N hip-end</text>
  <text x="540" y="495" class="dim">• Middle piece (D5..D8 only) → stays → chunk</text>
  <text x="540" y="515" class="dim">• South piece → rotated 90° CCW around (100,750) → SW corner</text>

  <text x="540" y="570" class="lbl" fill="#777">Upper-half W hip-end is EMPTY</text>
  <text x="540" y="590" class="dim">Per option [B], it needs another source.</text>

  <rect x="540" y="650" width="600" height="180" fill="#fffbeb" stroke="#ca8a04" stroke-width="1.5" rx="8" />
  <text x="555" y="680" class="lbl">Does this match your picture?</text>
  <text x="555" y="708" class="dim">Wing N hip-end = 8 colored pieces D1..D8 (north of valley/NW hip)</text>
  <text x="555" y="726" class="dim">Chunk = 4 colored pieces D5..D8 (middle, hatched in original)</text>
  <text x="555" y="744" class="dim">SW corner = 9 horizontal strips D1..D9 (rotated south pieces)</text>
  <text x="555" y="770" class="dim">Upper W hip-end = blank (your next step?)</text>
</svg>