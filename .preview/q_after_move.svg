  <rect x="100" y="400" width="38" height="350" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-width="0.4" stroke-dasharray="2,2" /><rect x="138" y="400" width="38" height="350" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-width="0.4" stroke-dasharray="2,2" /><rect x="176" y="400" width="38" height="350" fill="#eab308" fill-opacity="0.08" stroke="#eab308" stroke-width="0.4" stroke-dasharray="2,2" /><rect x="214" y="400" width="38" height="350" fill="#84cc16" fill-opacity="0.08" stroke="#84cc16" stroke-width="0.4" stroke-dasharray="2,2" /><rect x="252" y="400" width="38" height="350" fill="#10b981" fill-opacity="0.08" stroke="#10b981" stroke-width="0.4" stroke-dasharray="2,2" /><rect x="290" y="400" width="38" height="350" fill="#06b6d4" fill-opacity="0.08" stroke="#06b6d4" stroke-width="0.4" stroke-dasharray="2,2" /><rect x="328" y="400" width="38" height="350" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-width="0.4" stroke-dasharray="2,2" /><rect x="366" y="400" width="38" height="350" fill="#8b5cf6" fill-opacity="0.08" stroke="#8b5cf6" stroke-width="0.4" stroke-dasharray="2,2" /><rect x="404" y="400" width="38" height="350" fill="#ec4899" fill-opacity="0.08" stroke="#ec4899" stroke-width="0.4" stroke-dasharray="2,2" /><rect x="442" y="400" width="8" height="350" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-width="0.4" stroke-dasharray="2,2" />
  <rect x="100" y="400" width="350" height="350" class="yellow-box" />

