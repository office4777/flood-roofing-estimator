<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1300" style="background:#fff">
  <style>
    .gutter { stroke: #000; stroke-width: 3; fill: none; }
    .ph { stroke: #ca8a04; stroke-width: 1; stroke-dasharray: 6,4; fill: none; }
    .hip-nw { stroke: #c62828; stroke-width: 2; fill: none; }
    .hip-sw { stroke: #c62828; stroke-width: 2; fill: none; }
    .valley { stroke: #1565c0; stroke-width: 2; stroke-dasharray: 10,5; fill: none; }
    .ridge-ext { stroke: #8e24aa; stroke-width: 1.5; stroke-dasharray: 6,4; fill: none; }
    .yellow-box { stroke: #ca8a04; stroke-width: 2; fill: none; stroke-dasharray: 4,3; }
    .lbl { font-family: -apple-system, sans-serif; font-size: 14px; fill: #111; font-weight: 600; }
    .dim { font-family: -apple-system, sans-serif; font-size: 12px; fill: #444; }
    .empty { fill: #f5f5f5; stroke: #999; stroke-width: 1.5; stroke-dasharray: 5,4; }
  </style>

  <!-- L-shape outline -->
  <path d="M 100,100 L 400,100 L 400,400 L 1000,400 L 1000,1100 L 100,1100 Z" class="gutter" />

  <!-- Phantom main 4-hip lines -->
