<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1300" style="background:#fff">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e" />
    </marker>
  </defs>
  <style>
    .gutter { stroke: #000; stroke-width: 3; fill: none; }
    .ph { stroke: #ca8a04; stroke-width: 1; stroke-dasharray: 6,4; fill: none; }
    .hip-nw { stroke: #c62828; stroke-width: 2.5; fill: none; }
    .hip-sw { stroke: #c62828; stroke-width: 2.5; fill: none; }
    .valley { stroke: #1565c0; stroke-width: 2; stroke-dasharray: 10,5; fill: none; }
    .ridge-ext { stroke: #8e24aa; stroke-width: 1.5; stroke-dasharray: 6,4; fill: none; }
    .yellow-box { stroke: #ca8a04; stroke-width: 3; fill: none; }
    .lbl { font-family: -apple-system, sans-serif; font-size: 14px; fill: #111; font-weight: 600; }
    .dim { font-family: -apple-system, sans-serif; font-size: 12px; fill: #444; }
  </style>

  <!-- L-shape outline -->
  <path d="M 100,100 L 400,100 L 400,400 L 1000,400 L 1000,1100 L 100,1100 Z" class="gutter" />

  <!-- Phantom main 4-hip lines -->
  <line x1="1000" y1="400" x2="650" y2="750" class="ph" />
  <line x1="1000" y1="1100" x2="650" y2="750" class="ph" />
  <line x1="450" y1="750" x2="650" y2="750" class="ph" />

  <!-- South offcuts in their original position (upper-half W hip-end) -->
  <polygon points="100,400 138,438 138,750 100,750" fill="#ef4444" fill-opacity="0.4" stroke="#ef4444" stroke-width="0.8" /><text x="119" y="449" font-family="-apple-system" font-size="10" fill="#222" font-weight="700" text-anchor="middle">D1s</text><polygon points="138,438 176,476 176,750 138,750" fill="#f59e0b" fill-opacity="0.4" stroke="#f59e0b" stroke-width="0.8" /><text x="157" y="487" font-family="-apple-system" font-size="10" fill="#222" font-weight="700" text-anchor="middle">D2s</text><polygon points="176,476 214,514 214,750 176,750" fill="#eab308" fill-opacity="0.4" stroke="#eab308" stroke-width="0.8" /><text x="195" y="525" font-family="-apple-system" font-size="10" fill="#222" font-weight="700" text-anchor="middle">D3s</text><polygon points="214,514 252,552 252,750 214,750" fill="#84cc16" fill-opacity="0.4" stroke="#84cc16" stroke-width="0.8" /><text x="233" y="563" font-family="-apple-system" font-size="10" fill="#222" font-weight="700" text-anchor="middle">D4s</text><polygon points="252,552 290,590 290,750 252,750" fill="#10b981" fill-opacity="0.4" stroke="#10b981" stroke-width="0.8" /><text x="271" y="601" font-family="-apple-system" font-size="10" fill="#222" font-weight="700" text-anchor="middle">D5s</text><polygon points="290,590 328,628 328,750 290,750" fill="#06b6d4" fill-opacity="0.4" stroke="#06b6d4" stroke-width="0.8" /><text x="309" y="639" font-family="-apple-system" font-size="10" fill="#222" font-weight="700" text-anchor="middle">D6s</text><polygon points="328,628 366,666 366,750 328,750" fill="#3b82f6" fill-opacity="0.4" stroke="#3b82f6" stroke-width="0.8" /><text x="347" y="677" font-family="-apple-system" font-size="10" fill="#222" font-weight="700" text-anchor="middle">D7s</text><polygon points="366,666 404,704 404,750 366,750" fill="#8b5cf6" fill-opacity="0.4" stroke="#8b5cf6" stroke-width="0.8" /><text x="385" y="715" font-family="-apple-system" font-size="10" fill="#222" font-weight="700" text-anchor="middle">D8s</text><polygon points="404,704 442,742 442,750 404,750" fill="#ec4899" fill-opacity="0.4" stroke="#ec4899" stroke-width="0.8" /><text x="423" y="753" font-family="-apple-system" font-size="10" fill="#222" font-weight="700" text-anchor="middle">D9s</text><polygon points="442,742 450,750 450,750 442,750" fill="#ef4444" fill-opacity="0.4" stroke="#ef4444" stroke-width="0.8" /><text x="446" y="776" font-family="-apple-system" font-size="10" fill="#222" font-weight="700" text-anchor="middle">D10s</text>

  <!-- Rotated offcuts in SW corner (lower-half W hip-end) -->
  <polygon points="450,750 412,788 100,788 100,750" fill="#ef4444" fill-opacity="0.55" stroke="#ef4444" stroke-width="0.8" /><text x="265.5" y="772" font-family="-apple-system" font-size="10" fill="#222" font-weight="700" text-anchor="middle">D1s'</text><polygon points="412,788 374,826 100,826 100,788" fill="#f59e0b" fill-opacity="0.55" stroke="#f59e0b" stroke-width="0.8" /><text x="246.5" y="810" font-family="-apple-system" font-size="10" fill="#222" font-weight="700" text-anchor="middle">D2s'</text><polygon points="374,826 336,864 100,864 100,826" fill="#eab308" fill-opacity="0.55" stroke="#eab308" stroke-width="0.8" /><text x="227.5" y="848" font-family="-apple-system" font-size="10" fill="#222" font-weight="700" text-anchor="middle">D3s'</text><polygon points="336,864 298,902 100,902 100,864" fill="#84cc16" fill-opacity="0.55" stroke="#84cc16" stroke-width="0.8" /><text x="208.5" y="886" font-family="-apple-system" font-size="10" fill="#222" font-weight="700" text-anchor="middle">D4s'</text><polygon points="298,902 260,940 100,940 100,902" fill="#10b981" fill-opacity="0.55" stroke="#10b981" stroke-width="0.8" /><text x="189.5" y="924" font-family="-apple-system" font-size="10" fill="#222" font-weight="700" text-anchor="middle">D5s'</text><polygon points="260,940 222,978 100,978 100,940" fill="#06b6d4" fill-opacity="0.55" stroke="#06b6d4" stroke-width="0.8" /><text x="170.5" y="962" font-family="-apple-system" font-size="10" fill="#222" font-weight="700" text-anchor="middle">D6s'</text><polygon points="222,978 184,1016 100,1016 100,978" fill="#3b82f6" fill-opacity="0.55" stroke="#3b82f6" stroke-width="0.8" /><text x="151.5" y="1000" font-family="-apple-system" font-size="10" fill="#222" font-weight="700" text-anchor="middle">D7s'</text><polygon points="184,1016 146,1054 100,1054 100,1016" fill="#8b5cf6" fill-opacity="0.55" stroke="#8b5cf6" stroke-width="0.8" /><text x="132.5" y="1038" font-family="-apple-system" font-size="10" fill="#222" font-weight="700" text-anchor="middle">D8s'</text><polygon points="146,1054 108,1092 100,1092 100,1054" fill="#ec4899" fill-opacity="0.55" stroke="#ec4899" stroke-width="0.8" /><text x="113.5" y="1076" font-family="-apple-system" font-size="10" fill="#222" font-weight="700" text-anchor="middle">D9s'</text><polygon points="108,1092 100,1100 100,1100 100,1092" fill="#ef4444" fill-opacity="0.55" stroke="#ef4444" stroke-width="0.8" /><text x="102" y="1099" font-family="-apple-system" font-size="10" fill="#222" font-weight="700" text-anchor="middle">D10s'</text>

  <!-- Yellow box outline -->
  <rect x="100" y="400" width="350" height="350" class="yellow-box" />

  <!-- NW hip + SW hip -->
  <line x1="100" y1="400" x2="450" y2="750" class="hip-nw" />
  <line x1="100" y1="1100" x2="450" y2="750" class="hip-sw" />

  <!-- Ridge extended west -->
  <line x1="100" y1="750" x2="450" y2="750" class="ridge-ext" />

  <!-- Rotation arrow -->
  <path d="M 280 720 Q 200 880 200 970" fill="none" stroke="#0f766e" stroke-width="2.5" marker-end="url(#arr)" />
  <text x="200" y="850" class="lbl" fill="#0f766e">spin 90° + move</text>

  <!-- Labels -->
  <text x="540" y="450" class="lbl">Donor SOUTH offcuts (Dn s)</text>
  <text x="540" y="470" class="dim">below NW hip in yellow box,</text>
  <text x="540" y="488" class="dim">vertical strips, upper-half W hip-end</text>
  <text x="540" y="506" class="dim">collectively form a TRIANGLE</text>

  <text x="540" y="570" class="lbl">→ spun 90° CCW around (100, 750)</text>
  <text x="540" y="595" class="dim">(i.e., 90° to the "right" from a viewer)</text>

  <text x="540" y="650" class="lbl">→ become horizontal strips (Dn s')</text>
  <text x="540" y="670" class="dim">filling the SW corner hip (lower-half W hip-end)</text>

  <text x="540" y="730" class="lbl">Net effect:</text>
  <text x="540" y="750" class="dim">• upper-half W hip-end = vertical strips (south offcuts in place)</text>
  <text x="540" y="768" class="dim">• lower-half W hip-end = horizontal strips (rotated south offcuts)</text>
  <text x="540" y="786" class="dim">• donors get used twice? OR the upper-half is left empty?</text>

  <rect x="540" y="820" width="600" height="280" fill="#fffbeb" stroke="#ca8a04" stroke-width="1.5" rx="8" />
  <text x="555" y="850" class="lbl">Question — pick one:</text>
  <text x="555" y="880" class="dim">[A] Donor south offcuts STAY in the upper-half W hip-end (as drawn faded).</text>
  <text x="555" y="900" class="dim">    Then a SECOND set of donor sheets gets rotated for the SW corner.</text>
  <text x="555" y="930" class="dim">[B] Donor south offcuts are MOVED (not duplicated) to the SW corner.</text>
  <text x="555" y="950" class="dim">    Upper-half W hip-end is then covered by some OTHER source.</text>
  <text x="555" y="980" class="dim">[C] Donor sheet runs CONTINUOUSLY from N gutter all the way to S gutter,</text>
  <text x="555" y="1000" class="dim">    cut at every hip/ridge line — so each donor produces 4-5 pieces fitting</text>
  <text x="555" y="1020" class="dim">    different faces (wing N, chunk, upper W hip, lower W hip, maybe S long).</text>
  <text x="555" y="1060" class="dim">[D] Something else — please clarify.</text>
</svg>