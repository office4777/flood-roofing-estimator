<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1300" style="background:#fff">
  <style>
    .gutter { stroke: #000; stroke-width: 3; fill: none; }
    .ph { stroke: #ca8a04; stroke-width: 1.5; stroke-dasharray: 8,5; fill: none; }
    .hip-nw { stroke: #c62828; stroke-width: 3; fill: none; }
    .valley { stroke: #1565c0; stroke-width: 3; stroke-dasharray: 10,5; fill: none; }
    .ridge-ext { stroke: #8e24aa; stroke-width: 2; stroke-dasharray: 6,4; fill: none; }
    .yellow-box { stroke: #ca8a04; stroke-width: 4; fill: none; }
    .lbl { font-family: -apple-system, sans-serif; font-size: 15px; fill: #111; font-weight: 600; }
    .dim { font-family: -apple-system, sans-serif; font-size: 12px; fill: #555; font-style: italic; }
    .pt { fill: #c62828; }
  </style>

  <!-- L-shape outline -->
  <path d="M 100,100 L 400,100 L 400,400 L 1000,400 L 1000,1100 L 100,1100 Z" class="gutter" />

  <!-- Phantom main 4-hip lines (faded) -->
  <line x1="1000" y1="400" x2="650" y2="750" class="ph" />
  <line x1="100" y1="1100" x2="450" y2="750" class="ph" />
  <line x1="1000" y1="1100" x2="650" y2="750" class="ph" />
  <line x1="450" y1="750" x2="650" y2="750" class="ph" />

  <!-- Yellow box (the phantom hip region) -->
  <rect x="100" y="400" width="350" height="350" class="yellow-box" />

  <!-- Vertical donor sheets inside yellow box -->
  <rect x="101" y="400" width="36" height="350" fill="#f97316" fill-opacity="0.15" stroke="#c2410c" stroke-width="0.8" stroke-dasharray="3,2" /><text x="119" y="430" text-anchor="middle" font-family="-apple-system" font-size="11" fill="#92400e" font-weight="600">D1</text><rect x="139" y="400" width="36" height="350" fill="#f97316" fill-opacity="0.15" stroke="#c2410c" stroke-width="0.8" stroke-dasharray="3,2" /><text x="157" y="430" text-anchor="middle" font-family="-apple-system" font-size="11" fill="#92400e" font-weight="600">D2</text><rect x="177" y="400" width="36" height="350" fill="#f97316" fill-opacity="0.15" stroke="#c2410c" stroke-width="0.8" stroke-dasharray="3,2" /><text x="195" y="430" text-anchor="middle" font-family="-apple-system" font-size="11" fill="#92400e" font-weight="600">D3</text><rect x="215" y="400" width="36" height="350" fill="#f97316" fill-opacity="0.15" stroke="#c2410c" stroke-width="0.8" stroke-dasharray="3,2" /><text x="233" y="430" text-anchor="middle" font-family="-apple-system" font-size="11" fill="#92400e" font-weight="600">D4</text><rect x="253" y="400" width="36" height="350" fill="#f97316" fill-opacity="0.15" stroke="#c2410c" stroke-width="0.8" stroke-dasharray="3,2" /><text x="271" y="430" text-anchor="middle" font-family="-apple-system" font-size="11" fill="#92400e" font-weight="600">D5</text><rect x="291" y="400" width="36" height="350" fill="#f97316" fill-opacity="0.15" stroke="#c2410c" stroke-width="0.8" stroke-dasharray="3,2" /><text x="309" y="430" text-anchor="middle" font-family="-apple-system" font-size="11" fill="#92400e" font-weight="600">D6</text><rect x="329" y="400" width="36" height="350" fill="#f97316" fill-opacity="0.15" stroke="#c2410c" stroke-width="0.8" stroke-dasharray="3,2" /><text x="347" y="430" text-anchor="middle" font-family="-apple-system" font-size="11" fill="#92400e" font-weight="600">D7</text><rect x="367" y="400" width="36" height="350" fill="#f97316" fill-opacity="0.15" stroke="#c2410c" stroke-width="0.8" stroke-dasharray="3,2" /><text x="385" y="430" text-anchor="middle" font-family="-apple-system" font-size="11" fill="#92400e" font-weight="600">D8</text><rect x="405" y="400" width="36" height="350" fill="#f97316" fill-opacity="0.15" stroke="#c2410c" stroke-width="0.8" stroke-dasharray="3,2" /><text x="423" y="430" text-anchor="middle" font-family="-apple-system" font-size="11" fill="#92400e" font-weight="600">D9</text><rect x="443" y="400" width="6" height="350" fill="#f97316" fill-opacity="0.15" stroke="#c2410c" stroke-width="0.8" stroke-dasharray="3,2" /><text x="446" y="430" text-anchor="middle" font-family="-apple-system" font-size="11" fill="#92400e" font-weight="600">D10</text>

  <!-- NW hip line (diagonal across yellow box) -->
  <line x1="100" y1="400" x2="450" y2="750" class="hip-nw" />

  <!-- Phantom ridge extended westward to W gutter at y=750 (bottom of yellow box) -->
  <line x1="100" y1="750" x2="450" y2="750" class="ridge-ext" />

  <!-- Valley line -->
  <line x1="400" y1="400" x2="250" y2="550" class="valley" />

  <!-- Corner markers -->
  <circle cx="100" cy="400" r="6" class="pt" />
  <text x="20" y="395" class="lbl">NW (100, 400)</text>
  <text x="20" y="412" class="dim">NW hip meets gutter</text>

  <circle cx="450" cy="400" r="6" fill="#ca8a04" />
  <text x="460" y="395" class="lbl">NE (450, 400)</text>

  <circle cx="450" cy="750" r="6" class="pt" />
  <text x="460" y="745" class="lbl">SE (450, 750)</text>
  <text x="460" y="762" class="dim">NW hip meets ridge</text>

  <circle cx="100" cy="750" r="6" fill="#ca8a04" />
  <text x="20" y="745" class="lbl">SW (100, 750)</text>
  <text x="20" y="762" class="dim">ridge extended to W gutter</text>

  <!-- Cut labels -->
  <text x="540" y="500" class="lbl" fill="#c62828">CUT 1: NW hip (diagonal)</text>
  <text x="540" y="520" class="dim">splits each donor into: top=N long-side, bottom=W hip-end</text>

  <text x="540" y="570" class="lbl" fill="#1565c0">CUT 2: valley (45° SW)</text>
  <text x="540" y="590" class="dim">further cuts donors at x∈[250,400] near top</text>

  <text x="540" y="640" class="lbl" fill="#8e24aa">phantom ridge extended (bottom of box)</text>
  <text x="540" y="660" class="dim">marks where donor sheets end (y=750)</text>

  <text x="540" y="710" class="lbl" fill="#92400e">D1..D9 = vertical donor sheets</text>
  <text x="540" y="730" class="dim">full length 350px, running from N gutter to extended ridge</text>

  <!-- Question box -->
  <rect x="540" y="800" width="540" height="200" fill="#fffbeb" stroke="#ca8a04" stroke-width="1.5" rx="8" />
  <text x="555" y="830" class="lbl">Did I get the yellow box right?</text>
  <text x="555" y="860" class="dim">• yellow rect spans (100,400) → (450,750)</text>
  <text x="555" y="880" class="dim">• ~9 vertical donor sheets inside (D1..D9)</text>
  <text x="555" y="900" class="dim">• cuts: NW hip diagonal + valley + phantom-ridge-extended</text>
  <text x="555" y="930" class="lbl">If yes, what's the next step you want to walk me through?</text>
</svg>