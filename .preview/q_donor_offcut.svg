<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1300" style="background:#fafafa">
  <style>
    .gutter { stroke: #000; stroke-width: 3; fill: none; }
    .hip { stroke: #c62828; stroke-width: 2; stroke-dasharray: 4,3; fill: none; }
    .valley { stroke: #1565c0; stroke-width: 3; stroke-dasharray: 10,5; fill: none; }
    .ridge { stroke: #8e24aa; stroke-width: 2; stroke-dasharray: 4,3; fill: none; }
    .phantom { stroke: #ca8a04; stroke-width: 2.5; stroke-dasharray: 6,4; fill: none; }
    .label { font-family: -apple-system, sans-serif; font-size: 14px; fill: #111; font-weight: 600; }
    .lbl-sm { font-family: -apple-system, sans-serif; font-size: 12px; fill: #444; }
    .donor-bg { fill: #f97316; fill-opacity: 0.35; stroke: #c2410c; stroke-width: 1; }
    .offcut-bg { fill: #f97316; fill-opacity: 0.20; stroke: #c2410c; stroke-width: 1; stroke-dasharray: 2,2; }
  </style>

  <!-- L-shape outline -->
  <path d="M 100,100 L 400,100 L 400,400 L 1000,400 L 1000,1100 L 100,1100 Z" class="gutter" />

  <!-- Phantom main 4-hip (as if no wing) — show hip lines lightly -->
  <line x1="100" y1="400"  x2="450" y2="750"  class="phantom" />
  <line x1="1000" y1="400" x2="650" y2="750"  class="phantom" />
  <line x1="100" y1="1100" x2="450" y2="750"  class="phantom" />
  <line x1="1000" y1="1100" x2="650" y2="750" class="phantom" />
  <line x1="450" y1="750"  x2="650" y2="750"  class="phantom" />

  <!-- Phantom W hip-end triangle highlighted -->
  <polygon points="100,400 450,750 100,1100" fill="#fef3c7" fill-opacity="0.5" stroke="#ca8a04" stroke-width="2" stroke-dasharray="6,4" />

  <!-- Valley cut -->
  <line x1="400" y1="400" x2="250" y2="550" class="valley" />

  <!-- 5 horizontal donor sheets near the top of the phantom W hip-end -->
  
      <!-- donor remainder (south of valley) -->
      <rect x="100" y="400" width="14" height="28" class="donor-bg" />
      <!-- offcut (in chunk, north of valley) -->
      <rect x="114" y="400" width="272" height="28" class="offcut-bg" />
      <text x="102" y="418" class="lbl-sm" style="font-weight:600">1</text>
      <text x="245" y="418" class="lbl-sm" style="font-style:italic; fill:#c2410c">1'</text>
    
      <!-- donor remainder (south of valley) -->
      <rect x="100" y="430" width="44" height="28" class="donor-bg" />
      <!-- offcut (in chunk, north of valley) -->
      <rect x="144" y="430" width="212" height="28" class="offcut-bg" />
      <text x="117" y="448" class="lbl-sm" style="font-weight:600">2</text>
      <text x="245" y="448" class="lbl-sm" style="font-style:italic; fill:#c2410c">2'</text>
    
      <!-- donor remainder (south of valley) -->
      <rect x="100" y="460" width="74" height="28" class="donor-bg" />
      <!-- offcut (in chunk, north of valley) -->
      <rect x="174" y="460" width="152" height="28" class="offcut-bg" />
      <text x="132" y="478" class="lbl-sm" style="font-weight:600">3</text>
      <text x="245" y="478" class="lbl-sm" style="font-style:italic; fill:#c2410c">3'</text>
    
      <!-- donor remainder (south of valley) -->
      <rect x="100" y="490" width="104" height="28" class="donor-bg" />
      <!-- offcut (in chunk, north of valley) -->
      <rect x="204" y="490" width="92" height="28" class="offcut-bg" />
      <text x="147" y="508" class="lbl-sm" style="font-weight:600">4</text>
      <text x="245" y="508" class="lbl-sm" style="font-style:italic; fill:#c2410c">4'</text>
    
      <!-- donor remainder (south of valley) -->
      <rect x="100" y="520" width="134" height="28" class="donor-bg" />
      <!-- offcut (in chunk, north of valley) -->
      <rect x="234" y="520" width="32" height="28" class="offcut-bg" />
      <text x="162" y="538" class="lbl-sm" style="font-weight:600">5</text>
      <text x="245" y="538" class="lbl-sm" style="font-style:italic; fill:#c2410c">5'</text>
    

  <!-- Labels -->
  <text x="500" y="80" class="label">Phantom 4-hip W hip-end of main = YELLOW dotted triangle</text>
  <text x="500" y="105" class="lbl-sm">(this is what you drew on the picture)</text>

  <text x="500" y="200" class="label" fill="#c2410c">Donor sheet #N (solid fill, inside phantom hip-end)</text>
  <text x="500" y="225" class="label" fill="#c2410c">Offcut #N' (dashed fill, inside wing chunk)</text>
  <text x="500" y="248" class="lbl-sm">= the SAME physical sheet, cut at the valley line</text>

  <text x="500" y="320" class="label" fill="#1565c0">VALLEY cut at 45°</text>
  <text x="500" y="343" class="lbl-sm">(400, 400) → (250, 550)</text>

  <!-- Question to user -->
  <rect x="500" y="450" width="560" height="220" fill="#fff" stroke="#999" stroke-width="1" rx="8" />
  <text x="520" y="480" class="label">Question I'm trying to ask:</text>
  <text x="520" y="510" class="lbl-sm">In the current app render, the OFFCUT pieces (the ones in the wing</text>
  <text x="520" y="528" class="lbl-sm">chunk area) are shown as PURPLE with hatching.</text>
  <text x="520" y="560" class="lbl-sm">Should they be redrawn as ORANGE (matching their donor),</text>
  <text x="520" y="578" class="lbl-sm">so it's visually obvious they're part of the same physical sheet?</text>
  <text x="520" y="615" class="label" fill="#c2410c">[ A ] Yes — color the offcuts ORANGE like the donor</text>
  <text x="520" y="640" class="label" fill="#a855f7">[ B ] No — keep them PURPLE (wing color), just renumber</text>

</svg>