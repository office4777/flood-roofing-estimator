<?xml version="1.0"?><svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1400" viewBox="0 0 1400 1400" style="background:#fff;font-family:Inter,sans-serif">
    <!-- Title -->
    <text x="700" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0a1628">Perfect L-shape reference — 400-wide arms × 1000 long</text>
    <text x="700" y="62" text-anchor="middle" font-size="14" fill="#475569">Both arms have the same width (400px = 8m at scale 0.02m/px) and same length (1000px). All face sheets are the same length: 200px (= arm_width / 2).</text>

    <!-- Building footprint (translucent fill) -->
    <polygon points="200,200 600,200 600,800 1200,800 1200,1200 200,1200" fill="#fef3c7" fill-opacity="0.4" stroke="none"/>

    <!-- Gutters / outline -->
    <line x1="200" y1="200" x2="600" y2="200" stroke="#0a1628" stroke-width="3" /><line x1="600" y1="200" x2="600" y2="800" stroke="#0a1628" stroke-width="3" /><line x1="600" y1="800" x2="1200" y2="800" stroke="#0a1628" stroke-width="3" /><line x1="1200" y1="800" x2="1200" y2="1200" stroke="#0a1628" stroke-width="3" /><line x1="1200" y1="1200" x2="200" y2="1200" stroke="#0a1628" stroke-width="3" /><line x1="200" y1="1200" x2="200" y2="200" stroke="#0a1628" stroke-width="3" />

    <!-- Hips (45° green) -->
    <line x1="200" y1="200" x2="400" y2="400" stroke="#16a34a" stroke-width="3" /><line x1="600" y1="200" x2="400" y2="400" stroke="#16a34a" stroke-width="3" /><line x1="1200" y1="800" x2="1000" y2="1000" stroke="#16a34a" stroke-width="3" /><line x1="1200" y1="1200" x2="1000" y2="1000" stroke="#16a34a" stroke-width="3" /><line x1="200" y1="1200" x2="400" y2="1000" stroke="#16a34a" stroke-width="3" />

    <!-- Ridges (red) -->
    <line x1="1000" y1="1000" x2="400" y2="1000" stroke="#dc2626" stroke-width="3" /><line x1="400" y1="400" x2="400" y2="1000" stroke="#dc2626" stroke-width="3" />

    <!-- Valleys (orange, dashed) -->
    <line x1="600" y1="800" x2="400" y2="1000" stroke="#f59e0b" stroke-width="3" stroke-dasharray="10,5"/>

    <!-- Barges (purple) -->
    

    <!-- Vertex markers -->
    
      <circle cx="200" cy="200" r="6" fill="#dc2626" stroke="#fff" stroke-width="2"/>
      <text x="214" y="192" font-size="14" font-weight="600" fill="#111">(100, 100)</text>
      <circle cx="600" cy="200" r="6" fill="#dc2626" stroke="#fff" stroke-width="2"/>
      <text x="614" y="192" font-size="14" font-weight="600" fill="#111">(500, 100)</text>
      <circle cx="600" cy="800" r="6" fill="#dc2626" stroke="#fff" stroke-width="2"/>
      <text x="614" y="792" font-size="14" font-weight="600" fill="#111">(500, 700)</text>
      <circle cx="1200" cy="800" r="6" fill="#dc2626" stroke="#fff" stroke-width="2"/>
      <text x="1214" y="792" font-size="14" font-weight="600" fill="#111">(1100, 700)</text>
      <circle cx="1200" cy="1200" r="6" fill="#dc2626" stroke="#fff" stroke-width="2"/>
      <text x="1214" y="1192" font-size="14" font-weight="600" fill="#111">(1100, 1100)</text>
      <circle cx="200" cy="1200" r="6" fill="#dc2626" stroke="#fff" stroke-width="2"/>
      <text x="214" y="1192" font-size="14" font-weight="600" fill="#111">(100, 1100)</text>

    <!-- Reflex marker -->
    <circle cx="600" cy="800" r="10" fill="none" stroke="#dc2626" stroke-width="3"/>
    <text x="618" y="806" font-size="14" font-weight="700" fill="#dc2626">reflex</text>

    <!-- Arm labels -->
    
    <text x="400" y="500" font-size="22" font-weight="700" fill="#374151" text-anchor="middle">WING ARM</text>
    <text x="400" y="522" font-size="13" fill="#6b7280" text-anchor="middle">400 × 1000 (tall)</text>
    
    <text x="900" y="1000" font-size="22" font-weight="700" fill="#374151" text-anchor="middle">MAIN ARM</text>
    <text x="900" y="1022" font-size="13" fill="#6b7280" text-anchor="middle">1000 × 400 (wide)</text>

    <!-- Legend -->
    <g transform="translate(1120, 100)">
      <rect x="0" y="0" width="260" height="180" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="8"/>
      <text x="14" y="22" font-size="13" font-weight="700" fill="#0a1628">Roof lines</text>
      <line x1="14" y1="40" x2="40" y2="40" stroke="#0a1628" stroke-width="3"/>
      <text x="48" y="44" font-size="13" fill="#111">gutter (outline)</text>
      <line x1="14" y1="60" x2="40" y2="60" stroke="#16a34a" stroke-width="3"/>
      <text x="48" y="64" font-size="13" fill="#111">hip (45°, green)</text>
      <line x1="14" y1="80" x2="40" y2="80" stroke="#dc2626" stroke-width="3"/>
      <text x="48" y="84" font-size="13" fill="#111">ridge (red)</text>
      <line x1="14" y1="100" x2="40" y2="100" stroke="#f59e0b" stroke-width="3" stroke-dasharray="10,5"/>
      <text x="48" y="104" font-size="13" fill="#111">valley (orange, dashed)</text>
      <line x1="14" y1="120" x2="40" y2="120" stroke="#7c3aed" stroke-width="3"/>
      <text x="48" y="124" font-size="13" fill="#111">barge</text>
      <circle cx="27" cy="146" r="6" fill="#dc2626" stroke="#fff" stroke-width="2"/>
      <text x="48" y="150" font-size="13" fill="#111">outline vertex</text>
      <circle cx="27" cy="166" r="8" fill="none" stroke="#dc2626" stroke-width="2"/>
      <text x="48" y="170" font-size="13" fill="#111">reflex (inside corner)</text>
    </g>

    <!-- Dimensions box -->
    <g transform="translate(40, 1200)">
      <rect x="0" y="0" width="380" height="170" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1" rx="8"/>
      <text x="14" y="24" font-size="13" font-weight="700" fill="#0a1628">Dimensions (px at 0.02m/px)</text>
      <text x="14" y="48" font-size="12" fill="#111">Wing (vertical arm):  400 wide × 1000 tall (8m × 20m)</text>
      <text x="14" y="68" font-size="12" fill="#111">Main (horizontal arm): 1000 wide × 400 tall (20m × 8m)</text>
      <text x="14" y="88" font-size="12" fill="#111">Overlap (corner):       400 × 400 (8m × 8m)</text>
      <text x="14" y="108" font-size="12" fill="#111">Arm half-width:         200 px = 4m  (= all sheet lengths)</text>
      <text x="14" y="138" font-size="12" font-weight="700" fill="#0a1628">Reflex at (500, 700) = inside corner</text>
    </g>
  </svg>