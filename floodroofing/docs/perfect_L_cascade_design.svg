<?xml version="1.0"?><svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1300" viewBox="0 0 1400 1300" style="background:#fff;font-family:Inter,sans-serif">
  <defs>
    <marker id="arrow_dc2626" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#16a34a" stroke-width="2"/>
    </pattern>
  </defs>

  <text x="700" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0a1628">Perfect-L cascade design — v2 after corner correction</text>
  <text x="700" y="62" text-anchor="middle" font-size="13" fill="#475569">Cross-pair logic applied to both hip-ends. External corner (SW) feeds both valley areas at the internal corner.</text>

  <!-- Building footprint -->
  <polygon points="258.3333333333333,198.33333333333331 611.6666666666666,198.33333333333331 611.6666666666666,728.3333333333333 1141.6666666666665,728.3333333333333 1141.6666666666665,1081.6666666666665 258.3333333333333,1081.6666666666665" fill="#fffbeb" stroke="#0a1628" stroke-width="2.5"/>

  <!-- ====== N WING (top arm) ====== -->
  <!-- W long-side TOP donor zone (orange, clipped by NW hip) -->
  <polygon points="258.3333333333333,198.33333333333331 435,375 258.3333333333333,375" fill="#f97316" fill-opacity="0.5" stroke="rgba(0,0,0,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="320.16666666666663" y="308.75" font-size="11" font-weight="700" fill="#7c2d12" text-anchor="middle">orange donors</text>
  <text x="320.16666666666663" y="323.76666666666665" font-size="11" font-weight="700" fill="#7c2d12" text-anchor="middle">22,20,17,12,6</text>

  <!-- E long-side TOP donor zone (blue, clipped by NE hip) -->
  <polygon points="611.6666666666666,198.33333333333331 435,375 611.6666666666666,375" fill="#2563eb" fill-opacity="0.5" stroke="rgba(0,0,0,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="558.6666666666666" y="308.75" font-size="11" font-weight="700" fill="#1e3a8a" text-anchor="middle">blue donors</text>
  <text x="558.6666666666666" y="323.76666666666665" font-size="11" font-weight="700" fill="#1e3a8a" text-anchor="middle">21,19,16,11,5</text>

  <!-- N hip-end E half destination -->
  <polygon points="435,198.33333333333331 611.6666666666666,198.33333333333331 435,375" fill="url(#hatch)" fill-opacity="1" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="496.8333333333333" y="264.5833333333333" font-size="11" font-weight="700" fill="#14532d" text-anchor="middle">N hip-end</text>
  <text x="496.8333333333333" y="279.6" font-size="11" font-weight="700" fill="#14532d" text-anchor="middle">EAST half</text>

  <!-- N hip-end W half destination -->
  <polygon points="258.3333333333333,198.33333333333331 435,198.33333333333331 435,375" fill="url(#hatch)" fill-opacity="1" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="373.16666666666663" y="264.5833333333333" font-size="11" font-weight="700" fill="#14532d" text-anchor="middle">N hip-end</text>
  <text x="373.16666666666663" y="279.6" font-size="11" font-weight="700" fill="#14532d" text-anchor="middle">WEST half</text>

  <!-- ====== SE WING (east horizontal arm) — cross-pair on E hip-end ====== -->
  <!-- N long-side EAST donor zone (clipped by NE hip) -->
  <polygon points="965,728.3333333333333 1141.6666666666665,728.3333333333333 965,905" fill="#f97316" fill-opacity="0.5" stroke="rgba(0,0,0,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="1018" y="816.6666666666666" font-size="11" font-weight="700" fill="#7c2d12" text-anchor="middle">SE wing N donors</text>
  <text x="1018" y="831.6833333333333" font-size="10" fill="#7c2d12" text-anchor="middle">(N long-side, NE clip)</text>

  <!-- S long-side EAST donor zone (clipped by SE hip) -->
  <polygon points="965,1081.6666666666665 1141.6666666666665,1081.6666666666665 965,905" fill="#2563eb" fill-opacity="0.5" stroke="rgba(0,0,0,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="1018" y="993.3333333333333" font-size="11" font-weight="700" fill="#1e3a8a" text-anchor="middle">SE wing S donors</text>
  <text x="1018" y="1008.35" font-size="10" fill="#1e3a8a" text-anchor="middle">(S long-side, SE clip)</text>

  <!-- E hip-end S half destination (top->bottom cross-pair: N donors -> S half) -->
  <polygon points="1141.6666666666665,905 1141.6666666666665,1081.6666666666665 965,905" fill="url(#hatch)" fill-opacity="1" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="1084.25" y="988.9166666666666" font-size="11" font-weight="700" fill="#14532d" text-anchor="middle">E hip-end</text>
  <text x="1084.25" y="1003.9333333333333" font-size="11" font-weight="700" fill="#14532d" text-anchor="middle">SOUTH half</text>

  <!-- E hip-end N half destination -->
  <polygon points="1141.6666666666665,728.3333333333333 1141.6666666666665,905 965,905" fill="url(#hatch)" fill-opacity="1" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="1084.25" y="816.6666666666666" font-size="11" font-weight="700" fill="#14532d" text-anchor="middle">E hip-end</text>
  <text x="1084.25" y="831.6833333333333" font-size="11" font-weight="700" fill="#14532d" text-anchor="middle">NORTH half</text>

  <!-- ====== EXTERNAL CORNER (SW) -> internal corner (valley) ====== -->
  <!-- Wing W long-side BOTTOM donor zone (clipped by SW hip) -->
  <polygon points="258.3333333333333,905 435,905 258.3333333333333,1081.6666666666665" fill="#f97316" fill-opacity="0.45" stroke="rgba(0,0,0,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="320.16666666666663" y="997.75" font-size="11" font-weight="700" fill="#7c2d12" text-anchor="middle">wing W</text>
  <text x="320.16666666666663" y="1012.7666666666667" font-size="11" font-weight="700" fill="#7c2d12" text-anchor="middle">bottom donors</text>
  <text x="320.16666666666663" y="1026.9" font-size="10" fill="#7c2d12" text-anchor="middle">(SW-hip clipped)</text>

  <!-- Main S long-side WEST donor zone (clipped by SW hip), orange 76-108 -->
  <polygon points="435,905 258.3333333333333,1081.6666666666665 435,1081.6666666666665" fill="#f97316" fill-opacity="0.55" stroke="rgba(0,0,0,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="382" y="1006.5833333333333" font-size="11" font-weight="700" fill="#7c2d12" text-anchor="middle">main S west</text>
  <text x="382" y="1021.6" font-size="11" font-weight="700" fill="#7c2d12" text-anchor="middle">76,78,96,102,108</text>

  <!-- North side of valley destination (wing E long-side wedge near valley) -->
  <polygon points="611.6666666666666,728.3333333333333 435,905 567.5,772.5" fill="url(#hatch)" fill-opacity="1" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="541" y="816.6666666666666" font-size="11" font-weight="700" fill="#14532d" text-anchor="middle">NORTH of valley</text>

  <!-- South side of valley destination (main NW interior wedge below valley) -->
  <polygon points="611.6666666666666,728.3333333333333 435,905 258.3333333333333,905 258.3333333333333,728.3333333333333" fill="url(#hatch)" fill-opacity="0.6" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="417.3333333333333" y="834.3333333333333" font-size="11" font-weight="700" fill="#14532d" text-anchor="middle">SOUTH of valley</text>

  <!-- Roof lines on top -->
  <line x1="258.3333333333333" y1="198.33333333333331" x2="435" y2="375" stroke="#16a34a" stroke-width="2.5" /><line x1="611.6666666666666" y1="198.33333333333331" x2="435" y2="375" stroke="#16a34a" stroke-width="2.5" /><line x1="1141.6666666666665" y1="728.3333333333333" x2="965" y2="905" stroke="#16a34a" stroke-width="2.5" /><line x1="1141.6666666666665" y1="1081.6666666666665" x2="965" y2="905" stroke="#16a34a" stroke-width="2.5" /><line x1="258.3333333333333" y1="1081.6666666666665" x2="435" y2="905" stroke="#16a34a" stroke-width="2.5" />
  <line x1="435" y1="375" x2="435" y2="905" stroke="#dc2626" stroke-width="2.5" /><line x1="435" y1="905" x2="965" y2="905" stroke="#dc2626" stroke-width="2.5" />
  <line x1="611.6666666666666" y1="728.3333333333333" x2="435" y2="905" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="10,5"/>

  <!-- Cross-pair arrows for N hip-end -->
  <line x1="329" y1="348.5" x2="496.8333333333333" y2="286.66666666666663" stroke="#dc2626" stroke-width="2.5"  marker-end="url(#arrow_dc2626)"/>
  <line x1="558.6666666666666" y1="348.5" x2="364.3333333333333" y2="286.66666666666663" stroke="#dc2626" stroke-width="2.5"  marker-end="url(#arrow_dc2626)"/>

  <!-- Cross-pair arrows for E hip-end -->
  <line x1="1026.8333333333333" y1="816.6666666666666" x2="1097.5" y2="993.3333333333333" stroke="#dc2626" stroke-width="2.5"  marker-end="url(#arrow_dc2626)"/>
  <line x1="1026.8333333333333" y1="993.3333333333333" x2="1097.5" y2="825.5" stroke="#dc2626" stroke-width="2.5"  marker-end="url(#arrow_dc2626)"/>

  <!-- External corner (SW) -> valley areas -->
  <!-- Main S west orange (76-108) -> NORTH of valley -->
  <line x1="382" y1="1002.1666666666666" x2="532.1666666666666" y2="807.8333333333333" stroke="#dc2626" stroke-width="2.5"  marker-end="url(#arrow_dc2626)"/>
  <!-- Wing W bottom donors -> SOUTH of valley -->
  <line x1="320.16666666666663" y1="993.3333333333333" x2="426.1666666666667" y2="843.1666666666666" stroke="#dc2626" stroke-width="2.5"  marker-end="url(#arrow_dc2626)"/>

  <!-- Mark external & internal corners -->
  <circle cx="258.3333333333333" cy="1081.6666666666665" r="9" fill="none" stroke="#7c3aed" stroke-width="3"/>
  <text x="248.33333333333331" y="1103.6666666666665" font-size="12" font-weight="700" fill="#7c3aed" text-anchor="end">external corner</text>

  <circle cx="611.6666666666666" cy="728.3333333333333" r="10" fill="none" stroke="#dc2626" stroke-width="3"/>
  <text x="627.6666666666666" y="733.3333333333333" font-size="13" font-weight="700" fill="#dc2626">reflex (internal corner)</text>

  <!-- Legend -->
  <g transform="translate(1080, 110)">
    <rect x="0" y="0" width="300" height="240" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="8"/>
    <text x="14" y="22" font-size="13" font-weight="700" fill="#0a1628">Legend</text>
    <rect x="14" y="34" width="26" height="14" fill="#f97316" fill-opacity="0.55" stroke="rgba(0,0,0,0.3)" stroke-dasharray="4,3"/>
    <text x="48" y="46" font-size="12" fill="#111">orange donor zone</text>
    <rect x="14" y="56" width="26" height="14" fill="#2563eb" fill-opacity="0.55" stroke="rgba(0,0,0,0.3)" stroke-dasharray="4,3"/>
    <text x="48" y="68" font-size="12" fill="#111">blue donor zone</text>
    <rect x="14" y="78" width="26" height="14" fill="url(#hatch)" stroke="#16a34a" stroke-dasharray="4,3"/>
    <text x="48" y="90" font-size="12" fill="#111">offcut destination</text>
    <line x1="14" y1="106" x2="40" y2="106" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrow_dc2626)"/>
    <text x="48" y="110" font-size="12" fill="#111">offcut flow</text>
    <line x1="14" y1="126" x2="40" y2="126" stroke="#16a34a" stroke-width="2.5"/>
    <text x="48" y="130" font-size="12" fill="#111">hip line</text>
    <line x1="14" y1="146" x2="40" y2="146" stroke="#dc2626" stroke-width="2.5"/>
    <text x="48" y="150" font-size="12" fill="#111">ridge</text>
    <line x1="14" y1="166" x2="40" y2="166" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="10,5"/>
    <text x="48" y="170" font-size="12" fill="#111">valley</text>
    <circle cx="27" cy="190" r="8" fill="none" stroke="#dc2626" stroke-width="2"/>
    <text x="48" y="194" font-size="12" fill="#111">internal (reflex) corner</text>
    <circle cx="27" cy="212" r="7" fill="none" stroke="#7c3aed" stroke-width="2"/>
    <text x="48" y="216" font-size="12" fill="#111">external corner</text>
  </g>
</svg>