<?xml version="1.0"?><svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1300" viewBox="0 0 1400 1300" style="background:#fff;font-family:Inter,sans-serif">
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <text x="700" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0a1628">Perfect-L cascade design — my current understanding</text>
  <text x="700" y="62" text-anchor="middle" font-size="13" fill="#475569">Coloured zones = donor sheets (their offcuts flow). Hatched zones = destinations. Red arrows = offcut flow direction.</text>
  <text x="700" y="82" text-anchor="middle" font-size="13" fill="#475569">Tell me if any of these zones, colours, or arrows are wrong.</text>

  <!-- Building footprint -->
  <polygon points="258.3333333333333,198.33333333333331 611.6666666666666,198.33333333333331 611.6666666666666,728.3333333333333 1141.6666666666665,728.3333333333333 1141.6666666666665,1081.6666666666665 258.3333333333333,1081.6666666666665" fill="#fffbeb" stroke="#0a1628" stroke-width="2.5"/>

  <!-- Donor zones (current sheet colour, dashed border) -->
  <polygon points="258.3333333333333,198.33333333333331 435,375 258.3333333333333,375" fill="#f97316" fill-opacity="0.55" stroke="rgba(0,0,0,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="320.16666666666663" y="304.3333333333333" font-size="11" font-weight="700" fill="#7c2d12" text-anchor="middle">orange donors</text>
  <text x="320.16666666666663" y="320.23333333333335" font-size="11" font-weight="700" fill="#7c2d12" text-anchor="middle">22,20,17,12,6</text>
  <text x="320.16666666666663" y="333.48333333333335" font-size="10" fill="#7c2d12" text-anchor="middle">(wing W top)</text>

  <polygon points="611.6666666666666,198.33333333333331 435,375 611.6666666666666,375" fill="#2563eb" fill-opacity="0.55" stroke="rgba(0,0,0,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="549.8333333333333" y="304.3333333333333" font-size="11" font-weight="700" fill="#1e3a8a" text-anchor="middle">blue donors</text>
  <text x="549.8333333333333" y="320.23333333333335" font-size="11" font-weight="700" fill="#1e3a8a" text-anchor="middle">21,19,16,11,5</text>
  <text x="549.8333333333333" y="333.48333333333335" font-size="10" fill="#1e3a8a" text-anchor="middle">(wing E top)</text>

  <polygon points="258.3333333333333,905 435,905 258.3333333333333,1081.6666666666665" fill="#f97316" fill-opacity="0.55" stroke="rgba(0,0,0,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="329" y="993.3333333333333" font-size="11" font-weight="700" fill="#7c2d12" text-anchor="middle">orange donors</text>
  <text x="329" y="1009.2333333333333" font-size="11" font-weight="700" fill="#7c2d12" text-anchor="middle">76,78,96,102,108</text>
  <text x="329" y="1022.4833333333333" font-size="10" fill="#7c2d12" text-anchor="middle">(main S, SW corner)</text>

  <polygon points="1141.6666666666665,728.3333333333333 1141.6666666666665,1081.6666666666665 965,905" fill="#2563eb" fill-opacity="0.55" stroke="rgba(0,0,0,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="1071" y="896.1666666666666" font-size="11" font-weight="700" fill="#1e3a8a" text-anchor="middle">currently blue</text>
  <text x="1071" y="910.3" font-size="11" font-weight="700" fill="#1e3a8a" text-anchor="middle">73,71,61,54,47</text>
  <text x="1071" y="924.4333333333333" font-size="10" fill="#1e3a8a" text-anchor="middle">(should be offcut dest)</text>

  <!-- Destination zones (hatched green) -->
  <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="8" stroke="#16a34a" stroke-width="2"/>
  </pattern>
  <polygon points="435,198.33333333333331 611.6666666666666,198.33333333333331 435,375" fill="url(#hatch)" fill-opacity="1" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="496.8333333333333" y="260.16666666666663" font-size="11" font-weight="700" fill="#14532d" text-anchor="middle">N hip-end</text>
  <text x="496.8333333333333" y="275.18333333333334" font-size="11" font-weight="700" fill="#14532d" text-anchor="middle">EAST half</text>

  <polygon points="258.3333333333333,198.33333333333331 435,198.33333333333331 435,375" fill="url(#hatch)" fill-opacity="1" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="373.16666666666663" y="260.16666666666663" font-size="11" font-weight="700" fill="#14532d" text-anchor="middle">N hip-end</text>
  <text x="373.16666666666663" y="275.18333333333334" font-size="11" font-weight="700" fill="#14532d" text-anchor="middle">WEST half</text>

  <!-- Valley north side (wing E long-side wedge above valley) -->
  <polygon points="611.6666666666666,728.3333333333333 435,905 435,375 611.6666666666666,198.33333333333331" fill="url(#hatch)" fill-opacity="0.6" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="541" y="666.5" font-size="10" font-weight="700" fill="#14532d" text-anchor="middle">NORTH of valley</text>
  <text x="541" y="682.4" font-size="10" fill="#14532d" text-anchor="middle">(in wing E side)</text>

  <!-- Valley south side (main NW interior below valley) -->
  <polygon points="435,905 611.6666666666666,728.3333333333333 258.3333333333333,728.3333333333333 258.3333333333333,905" fill="url(#hatch)" fill-opacity="0.6" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="417.3333333333333" y="834.3333333333333" font-size="10" font-weight="700" fill="#14532d" text-anchor="middle">SOUTH of valley</text>
  <text x="417.3333333333333" y="850.2333333333333" font-size="10" fill="#14532d" text-anchor="middle">(in main NW)</text>

  <!-- Hips / ridges / valleys (on top) -->
  <line x1="258.3333333333333" y1="198.33333333333331" x2="435" y2="375" stroke="#16a34a" stroke-width="2.5" /><line x1="611.6666666666666" y1="198.33333333333331" x2="435" y2="375" stroke="#16a34a" stroke-width="2.5" /><line x1="1141.6666666666665" y1="728.3333333333333" x2="965" y2="905" stroke="#16a34a" stroke-width="2.5" /><line x1="1141.6666666666665" y1="1081.6666666666665" x2="965" y2="905" stroke="#16a34a" stroke-width="2.5" /><line x1="258.3333333333333" y1="1081.6666666666665" x2="435" y2="905" stroke="#16a34a" stroke-width="2.5" />
  <line x1="435" y1="375" x2="435" y2="905" stroke="#dc2626" stroke-width="2.5" /><line x1="435" y1="905" x2="965" y2="905" stroke="#dc2626" stroke-width="2.5" />
  <line x1="611.6666666666666" y1="728.3333333333333" x2="435" y2="905" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="10,5"/>

  <!-- Cascade arrows -->
  <!-- N wing cross-pair -->
  <line x1="346.66666666666663" y1="357.3333333333333" x2="505.66666666666663" y2="286.66666666666663" stroke="#dc2626" stroke-width="2.5"  marker-end="url(#arrowhead)"/>
  <line x1="523.3333333333333" y1="357.3333333333333" x2="346.66666666666663" y2="286.66666666666663" stroke="#dc2626" stroke-width="2.5"  marker-end="url(#arrowhead)"/>

  <!-- Orange 76-108 → north of valley -->
  <line x1="364.3333333333333" y1="949.1666666666666" x2="505.66666666666663" y2="640" stroke="#dc2626" stroke-width="2.5"  marker-end="url(#arrowhead)"/>

  <!-- SW hip 'offcut offcuts' → south of valley -->
  <line x1="364.3333333333333" y1="1019.8333333333333" x2="417.3333333333333" y2="852" stroke="#dc2626" stroke-width="2.5"  marker-end="url(#arrowhead)"/>

  <!-- SE wing donors (S long-side?) → E hip-end (currently 73/71/61/54/47) -->
  <line x1="788.3333333333333" y1="1019.8333333333333" x2="1035.6666666666665" y2="878.5" stroke="#dc2626" stroke-width="2.5"  marker-end="url(#arrowhead)"/>

  <!-- Reflex marker -->
  <circle cx="611.6666666666666" cy="728.3333333333333" r="10" fill="none" stroke="#dc2626" stroke-width="3"/>
  <text x="627.6666666666666" y="733.3333333333333" font-size="13" font-weight="700" fill="#dc2626">reflex</text>

  <!-- Legend -->
  <g transform="translate(1080, 110)">
    <rect x="0" y="0" width="300" height="240" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="8"/>
    <text x="14" y="22" font-size="13" font-weight="700" fill="#0a1628">Legend</text>
    <rect x="14" y="34" width="26" height="14" fill="#f97316" fill-opacity="0.55" stroke="rgba(0,0,0,0.3)" stroke-dasharray="4,3"/>
    <text x="48" y="46" font-size="12" fill="#111">orange donor zone</text>
    <rect x="14" y="56" width="26" height="14" fill="#2563eb" fill-opacity="0.55" stroke="rgba(0,0,0,0.3)" stroke-dasharray="4,3"/>
    <text x="48" y="68" font-size="12" fill="#111">blue donor zone</text>
    <rect x="14" y="78" width="26" height="14" fill="url(#hatch)" stroke="#16a34a" stroke-dasharray="4,3"/>
    <text x="48" y="90" font-size="12" fill="#111">offcut destination</text>
    <line x1="14" y1="106" x2="40" y2="106" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowhead)"/>
    <text x="48" y="110" font-size="12" fill="#111">offcut flow direction</text>
    <line x1="14" y1="126" x2="40" y2="126" stroke="#16a34a" stroke-width="2.5"/>
    <text x="48" y="130" font-size="12" fill="#111">hip line</text>
    <line x1="14" y1="146" x2="40" y2="146" stroke="#dc2626" stroke-width="2.5"/>
    <text x="48" y="150" font-size="12" fill="#111">ridge</text>
    <line x1="14" y1="166" x2="40" y2="166" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="10,5"/>
    <text x="48" y="170" font-size="12" fill="#111">valley</text>
    <circle cx="27" cy="190" r="8" fill="none" stroke="#dc2626" stroke-width="2"/>
    <text x="48" y="194" font-size="12" fill="#111">reflex (inside corner)</text>
    <text x="14" y="220" font-size="11" font-style="italic" fill="#475569">Tell me what's wrong or missing.</text>
  </g>
</svg>